<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Worksheet — Dynamic Facts Firewall</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="app-header">
  <div class="header-inner container">
    <div class="top-row">
      <div class="brand">
        <h1>Dynamic Facts Firewall</h1>
        <p>Printable worksheet: sort statements into prompt blocks.</p>
      </div>
      <div class="pills">
        <span class="pill" id="pillVersion">—</span>
        <span class="pill pill-muted" id="pillEnv">—</span>
      </div>
    </div>
    <div class="nav-row">
      <a class="btn btn-secondary" href="index.html" role="button">Back to App</a>
      <button class="btn btn-secondary" id="btnTheme" type="button">Theme</button>
      <a class="btn btn-secondary" href="help.html" role="button">Help</a>
      <a class="btn btn-secondary" href="feedback.html" role="button">Feedback</a>
    </div>
  </div>
</header>

<main class="worksheet-wrap">
  <section class="card section">
    <h2>Worksheet</h2>
    <div class="control-row">
      <div>
        <label class="sr-only" for="selWsScenario">Scenario</label>
        <select id="selWsScenario" aria-label="Scenario selector"></select>
        <div class="small-note" id="wsNote"></div>
      </div>
      <div>
        <label class="sr-only" for="wsDate">As-of date</label>
        <input id="wsDate" type="date" aria-label="As-of date" />
        <div class="small-note">Tip: print once, then re-run with a new date to see what becomes stale.</div>
      </div>
    </div>

    <div class="ws-actions">
      <button class="btn" id="btnPrint" type="button">Print</button>
      <label class="toggle"><input id="chkAnswers" type="checkbox" /><span>Show answer key</span></label>
      <div class="small-note" id="wsSignals"></div>
    </div>

    <div id="wsTable"></div>

    <details class="details">
      <summary>Answer key (why each card belongs)</summary>
      <div class="details-body" id="wsAnswers"></div>
    </details>
  </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<span aria-live="polite" class="sr-only" id="themeStatus"></span>

<script src="js/worksheet.js"></script>
</body>
</html>
