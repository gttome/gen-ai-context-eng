<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1" name="viewport"/>
<title>Feedback</title>
<link href="css/style.css" rel="stylesheet"/>
</head>
<body>
<main class="container" style="padding-top: 18px;">
<section class="card section">
<h1 style="margin:0 0 8px 0; font-size:18px;">Feedback</h1>
<p class="muted">This is a placeholder. In later iterations, this page can collect feedback via a form-to-email link or a GitHub issue link (still static-safe).</p>
<p class="muted">For now: note what scenario you used, what confused you, and what you wish the app showed.</p>
<p><a class="btn btn-secondary" href="index.html" role="button">Back to App</a></p>
</section>
</main>
<script>
    (function() {
      const key = "app_theme";
      const saved = localStorage.getItem(key);
      if (saved) document.documentElement.setAttribute("data-theme", saved);
      else {
        const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.setAttribute("data-theme", prefersDark ? "dark" : "light");
      }
    })();
  </script>
</body>
</html>
