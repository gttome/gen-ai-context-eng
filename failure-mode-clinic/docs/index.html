<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Failure Mode Clinic</title>
  <meta name="description" content="A mobile-first clinic for diagnosing LLM failure modes and fixing prompts/context." />
  <link rel="stylesheet" href="./css/style.css?v=0.5.0" />
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="app-header">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">🩺</div>
      <div class="brand-text">
        <div class="brand-title">Failure Mode Clinic</div>
        <div class="brand-subtitle">Diagnose → Fix context → Verify</div>
      </div>
    </div>

    <div class="header-tools">
      <div class="pills" aria-label="Environment and version">
        <span id="pillEnv" class="pill" aria-label="Runtime environment">ENV</span>
        <span id="pillVersion" class="pill" aria-label="App version">v0.4.2</span>
      </div>

      <a class="icon-btn" href="./help.html" aria-label="Help" title="Help">
        <span aria-hidden="true">❓</span>
      </a>
      <a class="icon-btn" href="./feedback.html" aria-label="Feedback" title="Feedback">
        <span aria-hidden="true">💬</span>
      </a>

      <button id="btnTheme" class="icon-btn" type="button" aria-label="Toggle theme" title="Toggle theme">
        <span aria-hidden="true">🌗</span>
      </button>
    </div>
  </header>

  <main id="main" class="app-main">
    <section id="viewClinic" class="view" data-view="clinic" aria-label="Clinic view"></section>
    <section id="viewLibrary" class="view" data-view="library" aria-label="Library view"></section>
    <section id="viewBuilder" class="view" data-view="builder" aria-label="Builder view"></section>
    <section id="viewAbout" class="view" data-view="about" aria-label="About view"></section>
  </main>

  <nav class="bottom-nav" aria-label="Primary">
    <button class="nav-item" data-nav="clinic" type="button">
      <span class="nav-ico" aria-hidden="true">🩺</span>
      <span class="nav-txt">Clinic</span>
    </button>
    <button class="nav-item" data-nav="library" type="button">
      <span class="nav-ico" aria-hidden="true">📚</span>
      <span class="nav-txt">Library</span>
    </button>
    <button class="nav-item" data-nav="builder" type="button">
      <span class="nav-ico" aria-hidden="true">🛠️</span>
      <span class="nav-txt">Builder</span>
    </button>
    <button class="nav-item" data-nav="about" type="button">
      <span class="nav-ico" aria-hidden="true">ℹ️</span>
      <span class="nav-txt">About</span>
    </button>
  </nav>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></div>
  <div id="modalRoot" class="modal-root" aria-hidden="true"></div>

  <script src="./js/app.js?v=0.5.0"></script>
</body>
</html>
